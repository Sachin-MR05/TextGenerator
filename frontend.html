<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Generator</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: 60px auto; background: #fff; padding: 32px 24px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        textarea { width: 100%; height: 80px; padding: 10px; border-radius: 6px; border: 1px solid #ccc; margin-bottom: 16px; font-size: 1rem; }
        button { width: 100%; padding: 12px; background: #0078d7; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #005fa3; }
        .result { margin-top: 24px; background: #f0f8ff; padding: 16px; border-radius: 6px; min-height: 40px; color: #222; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Text Generator</h1>
        <form id="genForm">
            <textarea id="prompt" placeholder="Enter your prompt here..."></textarea>
            <button type="submit">Generate</button>
        </form>
        <div class="result" id="result"></div>
    </div>
    <script>
        const API_BASE = window.API_BASE || '';

        document.getElementById('genForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const prompt = document.getElementById('prompt').value;
            document.getElementById('result').textContent = 'Generating...';
            try {
                const res = await fetch(`${API_BASE}/generate?prompt=${encodeURIComponent(prompt)}`);
                const contentType = res.headers.get('content-type') || '';
                const isJson = contentType.includes('application/json');
                const payload = isJson ? await res.json() : await res.text();

                if (!res.ok) {
                    const errorMessage = isJson
                        ? (payload.detail || JSON.stringify(payload))
                        : String(payload);
                    throw new Error(errorMessage || `Request failed with status ${res.status}`);
                }

                document.getElementById('result').textContent = payload.generated_text || 'No result.';
            } catch (err) {
                document.getElementById('result').textContent = `Error: ${err.message || err}`;
            }
        });
    </script>
</body>
</html>
